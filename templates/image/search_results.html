{% extends "base.html" %}
{% block content %}
<div class="max-w-6xl mx-auto px-4 py-12">
    <h2 class="text-2xl font-black mb-4">Search Results for "{{ query }}"</h2>
    <p class="text-gray-500 mb-8">{{ results.count }} items found.</p>

    <div class="columns-1 md:columns-3 gap-6">
        {% for img in results %}
            <div class="mb-6 break-inside-avoid">
                <a href="{{ img.get_absolute_url }}">
                    <img src="{{ img.image.url }}" class="rounded-3xl shadow-sm hover:shadow-2xl transition-all duration-500">
                </a>
                <h3 class="mt-3 font-bold text-gray-900">{{ img.title }}</h3>
            </div>
        {% empty %}
            <div class="col-span-full text-center py-20">
                <p class="text-gray-400 italic text-lg">No stories found matching your search. 🔍</p>
                <a href="/" class="text-indigo-600 font-bold mt-4 inline-block">Go back Home</a>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
