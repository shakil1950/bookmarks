{% extends "base.html" %}
{% block title %}Forget password {% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center  px-4 px-4">
    <div class="max-w-md w-full backdrop-blur-lg bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 p-8 rounded-3xl shadow-2xl border border-white/30">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-white tracking-tight">Reset Password</h2>
            <p class="text-indigo-100 mt-2">Enter your username to receive a reset link.</p>
        </div>

        {% if messages %}
            {% for message in messages %}
            <div class="mb-4 p-4 rounded-xl {% if message.tags == 'error' %}bg-red-500/20 border border-red-500/50 text-red-100{% else %}bg-green-500/20 border border-green-500/50 text-green-100{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-white mb-2">Username</label>
                <input type="text" name="username" required 
                    class="w-full px-5 py-4 bg-white/10 border border-white/20 rounded-2xl text-white placeholder-indigo-200 focus:outline-none focus:ring-2 focus:ring-white/50 transition-all"
                    placeholder="Enter your username">
            </div>

            <button type="submit" 
                class="w-full py-4 bg-white text-indigo-600 font-bold rounded-2xl shadow-lg hover:bg-indigo-50 transform hover:-translate-y-1 transition-all active:scale-95">
                Send Reset Link
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="{% url 'login' %}" class="text-white hover:underline transition-all text-sm">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
