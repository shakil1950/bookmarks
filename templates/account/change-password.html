{% extends "base.html" %}

{% block title %}Change Password{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="flex justify-center">
            <div class="w-16 h-16 bg-indigo-100 rounded-2xl flex items-center justify-center shadow-sm">
                <i class="fa-solid fa-shield-halved text-2xl text-indigo-600"></i>
            </div>
        </div>
        <h2 class="mt-6 text-center text-3xl font-black text-gray-900 tracking-tight">
            Security Check
        </h2>
        <p class="mt-2 text-center text-sm text-gray-500 font-medium">
            Update your account password safely
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow-[0_10px_40px_rgba(0,0,0,0.04)] border border-gray-100 sm:rounded-[2rem] sm:px-10">
            
            {% if messages %}
                {% for message in messages %}
                    <div class="mb-6 p-4 rounded-2xl {% if message.tags == 'error' %}bg-red-50 text-red-600 border border-red-100{% else %}bg-green-50 text-green-600 border border-green-100{% endif %} flex items-center gap-3 text-sm font-bold">
                        <i class="fa-solid {% if message.tags == 'error' %}fa-circle-exclamation{% else %}fa-circle-check{% endif %}"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form action="." method="POST" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Current Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-gray-300 text-xs"></i>
                        </div>
                        <input type="password" name="prev_pass" required
                            class="block w-full pl-10 pr-4 py-3.5 bg-gray-50 border border-transparent focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 rounded-2xl text-sm font-semibold transition-all duration-200" 
                            placeholder="••••••••">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">New Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-key text-gray-300 text-xs"></i>
                        </div>
                        <input type="password" name="pass1" required
                            class="block w-full pl-10 pr-4 py-3.5 bg-gray-50 border border-transparent focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 rounded-2xl text-sm font-semibold transition-all duration-200" 
                            placeholder="Enter new password">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Confirm New Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-check-double text-gray-300 text-xs"></i>
                        </div>
                        <input type="password" name="pass2" required
                            class="block w-full pl-10 pr-4 py-3.5 bg-gray-50 border border-transparent focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 rounded-2xl text-sm font-semibold transition-all duration-200" 
                            placeholder="Repeat new password">
                    </div>
                </div>

                <div>
                    <button type="submit" 
                        class="w-full flex justify-center py-4 px-4 border border-transparent rounded-2xl shadow-lg shadow-indigo-100 text-sm font-black text-white bg-indigo-600 hover:bg-gray-900 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all duration-300 transform active:scale-[0.98]">
                        Update Password
                    </button>
                </div>
            </form>

            <div class="mt-8 text-center">
                <a href="{% url 'profile_view' %}" class="text-xs font-bold text-gray-400 hover:text-indigo-600 transition-colors uppercase tracking-widest">
                    <i class="fa-solid fa-arrow-left-long mr-2"></i> Back to Profile
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
