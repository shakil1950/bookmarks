{% load thumbnail %}
{% for user in users %}
<div class="user-card group relative bg-white border border-gray-100 p-6 rounded-[2.5rem] hover:shadow-[0_20px_50px_rgba(0,0,0,0.05)] transition-all duration-500">
    <a href="{{ user.get_absolute_url }}" class="absolute inset-0 z-10"></a>
    <div class="flex flex-col items-center">
        <div class="relative mb-4">
            <div class="w-20 h-20 rounded-[1.8rem] overflow-hidden group-hover:scale-110 transition-transform duration-500">
                {% if user.profile.avater %}
                    <img src="{% thumbnail user.profile.avater 100x100 %}" class="w-full h-full object-cover">
                {% else %}
                    <img src="https://ui-avatars.com/api/?name={{ user.username }}&background=f3f4f6&color=6366f1" class="w-full h-full object-cover">
                {% endif %}
            </div>
        </div>
        <h5 class="text-sm font-black text-gray-900 mb-1 capitalize">{{ user.username }}</h5>
        <div class="flex items-center gap-1.5">
            <span class="w-1 h-1 bg-green-500 rounded-full"></span>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">{{ user.followers.count }} Fans</p>
        </div>
    </div>
</div>
{% endfor %}
