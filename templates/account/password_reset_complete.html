{% extends "base.html" %}
{% block title %} Reset complete {% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 px-4">
    <div class="max-w-md w-full bg-white p-10 rounded-3xl shadow-xl text-center border border-gray-100">
        <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </div>
        <h2 class="text-2xl font-bold text-gray-800">Password Reset Complete!</h2>
        <p class="text-gray-500 mt-4 leading-relaxed">
            Your password has been successfully reset. You can now log in with your new password.
        </p>
        <div class="mt-8">
            <a href="{% url 'login' %}" class="inline-block px-10 py-4 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-all">
                Login Now
            </a>
        </div>
    </div>
</div>
{% endblock %}
