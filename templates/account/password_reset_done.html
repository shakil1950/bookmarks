{% extends "base.html" %}
{% block title %} Email sent {% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
    <div class="max-w-md w-full bg-white p-10 rounded-3xl shadow-xl text-center border border-gray-100">
        <div class="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 text-indigo-600">Email Sent!</h2>
        <p class="text-gray-500 mt-4 leading-relaxed">
            If an email is linked to your username, we have sent instructions to reset your password. 
            <span class="block mt-2 font-medium text-gray-600 italic text-sm underline decoration-indigo-200">Please check your inbox (and spam folder).</span>
        </p>
        <div class="mt-8">
            <a href="{% url 'login' %}" class="inline-block px-10 py-3 bg-indigo-600 text-white font-semibold rounded-xl hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100">
                Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
