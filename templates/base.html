{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %} Home {% endblock %} | Bookmarks</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="{% static 'js/sweetalert.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-cookie@3.0.5/dist/js.cookie.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
   
    <script>
        const csrftoken = Cookies.get('csrftoken');

        document.addEventListener('DOMContentLoaded', (event) => {
            
            document.addEventListener('click', function(e) {
            const likeButton = e.target.closest('a.like');
            if (likeButton) {
                e.preventDefault();

                const isAuthenticated = {{ request.user.is_authenticated|yesno:"true,false" }};
                if (!isAuthenticated) {
                    Swal.fire({
                            title: '<span class="text-2xl font-black">Join Bookmarks</span>',
                            html: `
                                <div class="text-left mt-4">
                                    <p class="text-gray-500 mb-6 text-center">Save your favorite photos and connect with creators.</p>
                                    <div class="space-y-3">
                                        <a href="{% url 'login' %}" class="w-full flex items-center justify-center py-3 bg-gray-900 text-white rounded-xl font-bold hover:bg-black transition">
                                            Login with Gmail
                                        </a>
                                        <div class="relative py-2 text-center">
                                            <span class="bg-white px-2 text-xs text-gray-400 uppercase tracking-widest relative z-10">Or</span>
                                            <hr class="absolute top-1/2 w-full border-gray-100">
                                        </div>
                                        <a href="{% url 'registration' %}" class="w-full flex items-center justify-center py-3 border-2 border-gray-100 rounded-xl font-bold hover:bg-gray-50 transition">
                                            Create an account
                                        </a>
                                    </div>
                                    <p class="text-center mt-6 text-xs text-gray-400">
                                        By joining, you agree to our Terms and Privacy Policy.
                                    </p>
                                </div>
                            `,
                            showConfirmButton: false,
                            showCloseButton: true,
                            customClass: {
                                popup: 'rounded-[2.5rem] p-10',
                                closeButton: 'border-none focus:outline-none'
                            }
                        });
                    return; 
                }

                const url = '{% url "like" %}';
                const imageId = likeButton.dataset.id;
                const action = likeButton.dataset.action;

                var formData = new FormData();
                formData.append('id', imageId);
                formData.append('action', action);

                fetch(url, {
                    method: 'POST',
                    headers: {'X-CSRFToken': csrftoken},
                    body: formData,
                    mode: 'same-origin'
                })
                .then(response => response.json())
                .then(data => {
                    if (data['status'] === 'ok') {
                        
                        const previousAction = action;
                        const nextAction = previousAction === 'like' ? 'unlike' : 'like';
                        likeButton.dataset.action = nextAction;

                        
                        if (previousAction === 'like') {
                            likeButton.classList.remove('bg-black/20', 'text-white');
                            likeButton.classList.add('bg-white', 'text-red-500');
                        } else {
                            likeButton.classList.remove('bg-white', 'text-red-500');
                            likeButton.classList.add('bg-black/20', 'text-white');
                        }

                        
                        const countSpans = document.querySelectorAll('.like-count-' + imageId);
                        countSpans.forEach(span => {
                            let totalLikes = parseInt(span.innerText.replace(/,/g, '')) || 0;
                            span.innerText = previousAction === 'like' ? (totalLikes + 1) : (totalLikes - 1);
                        });
                    }
                });
            }
        });
        
            let page = 1;
            let emptyPage = false;
            let blockRequest = false;

            window.addEventListener('scroll', function() {
                let margin = document.body.clientHeight - window.innerHeight - 200;
                if (window.pageYOffset > margin && !emptyPage && !blockRequest) {
                    blockRequest = true;
                    page += 1;
                    fetch('?images_only=1&page=' + page)
                    .then(response => response.text())
                    .then(html => {
                        if (html.trim() === '') {
                            emptyPage = true;
                        } else {
                            let imageList = document.getElementById('image-list');
                            if (imageList) {
                                imageList.insertAdjacentHTML('beforeEnd', html);
                                blockRequest = false;
                            }
                        }
                    });
                }
            });

            {% block domready %}{% endblock %}
        });
    </script>
</head>
<body class="bg-gray-50">
    {% include "nav.html" %}
    
    <div id="content">
        {% block content %}{% endblock %}
    </div>
    {% include "footer.html" %}
    {% if messages %}
    <script>
        {% for message in messages %}
            Swal.fire({
                icon: "{% if message.tags == 'error' %}error{% else %}success{% endif %}",
                title: "{{ message }}",
                timer: 3000
            });
        {% endfor %}
    </script>
    {% endif %}
</body>
</html>
